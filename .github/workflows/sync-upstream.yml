name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync copilot extension from microsoft/vscode
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/microsoft/vscode.git /tmp/vscode
          cd /tmp/vscode
          git sparse-checkout set extensions/copilot
          cd -
          rsync -a --delete \
            --exclude='node_modules' \
            /tmp/vscode/extensions/copilot/ ./
          git checkout -- .github/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Apply BYOK patches
        run: bash .github/scripts/apply-byok-patches.sh

      - name: Commit and push if changed
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No upstream changes detected"
          else
            git commit -m "Sync upstream copilot extension + apply BYOK patches"
            git push origin main
          fi
