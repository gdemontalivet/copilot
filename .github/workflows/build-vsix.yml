name: Build Extension VSIX

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Apply Patch (Optional)
        # If you prefer to apply the patch dynamically instead of committing it, 
        # uncomment the line below. Otherwise, it uses the committed code.
        # run: git apply my-byok-changes.patch
        run: echo "Using committed code. If you want to apply a patch dynamically, update this step."

      - name: Build Extension (VSIX)
        run: |
          npm run build
          # Install vsce globally
          npm install -g @vscode/vsce
          # Package the extension
          vsce package -o copilot-custom-build.vsix

      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-custom-build
          path: copilot-custom-build.vsix

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="build-${GITHUB_SHA::7}"
          gh release create "$TAG_NAME" copilot-custom-build.vsix \
            --title "Build ${GITHUB_SHA::7}" \
            --notes "Automated build from commit $GITHUB_SHA" \
            --target $GITHUB_SHA
